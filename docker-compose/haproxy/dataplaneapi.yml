---
config_version: 2
name: haproxy-dataplaneapi
dataplaneapi:
  host: 0.0.0.0
  port: 5555

  # Use HAProxy userlist for authentication instead of inline users
  userlist_file: /usr/local/etc/haproxy/haproxy.cfg

  # Show system info
  show_system_info: true

  # Security settings
  scheme:
    - http

  # Transaction settings
  transaction:
    transaction_dir: /tmp/haproxy_transactions

# HAProxy configuration
haproxy:
  config_file: /usr/local/etc/haproxy/haproxy.cfg
  haproxy_bin: /usr/local/sbin/haproxy
  master_worker_mode: true
  master_runtime: /var/run/haproxy/master.sock
  # Use the admin socket from HAProxy config
  admin_socket_path: /var/run/haproxy.sock
  reload:
    reload_delay: 5
    service_name: haproxy
    reload_strategy: systemd

# Logging configuration
log_targets:
  - log_to: stdout
    log_level: info
    log_format: text
    log_types:
      - app
      - access
