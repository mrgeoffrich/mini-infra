global
    log stdout local0
    log stdout local1 notice
    maxconn 4096
    stats socket /var/run/haproxy.sock mode 660 level admin
    stats timeout 30s
    master-worker
    expose-deprecated-directives
    insecure-fork-wanted
    # Uncomment below for SSL/TLS support
    # tune.ssl.default-dh-param 2048
    # ssl-default-bind-ciphers ECDHE+AESGCM:ECDHE+AES256:ECDHE+AES128:!PSK:!DHE:!RSA:!DSS:!aNull:!MD5
    # ssl-default-bind-options no-sslv3 no-tlsv10 no-tlsv11

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option http-server-close
    option forwardfor except 127.0.0.0/8
    option redispatch
    retries 3
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    errorfile 400 /usr/local/etc/haproxy/errors/400.http
    errorfile 403 /usr/local/etc/haproxy/errors/403.http
    errorfile 408 /usr/local/etc/haproxy/errors/408.http
    errorfile 500 /usr/local/etc/haproxy/errors/500.http
    errorfile 502 /usr/local/etc/haproxy/errors/502.http
    errorfile 503 /usr/local/etc/haproxy/errors/503.http
    errorfile 504 /usr/local/etc/haproxy/errors/504.http

# User list for Data Plane API authentication
userlist dataplaneapi
    user admin insecure-password admin  # Change this to a secure password in production
    user apiuser insecure-password apipassword  # Additional API user

# Data Plane API program section
program api
    command /usr/local/bin/dataplaneapi -f /usr/local/etc/haproxy/dataplaneapi.yml
    no option start-on-reload

# Stats Frontend
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 30s
    stats realm HAProxy\ Statistics
    stats auth admin:admin  # Change this to a secure password in production

# Frontend configuration for HTTP traffic
frontend http_front
    bind *:80
    
    # ACL examples (uncomment and modify as needed)
    # acl is_api path_beg /api
    # acl is_static path_end .js .css .png .jpg .gif .ico
    
    # Redirect to HTTPS (uncomment if using SSL)
    # redirect scheme https if !{ ssl_fc }
    
    # Use backend based on ACL (examples)
    # use_backend api_servers if is_api
    # use_backend static_servers if is_static
    
    # Default backend
    default_backend web_servers

# Frontend configuration for HTTPS traffic (uncomment if using SSL)
# frontend https_front
#     bind *:443 ssl crt /etc/ssl/certs/haproxy.pem
#     
#     # ACL examples
#     # acl is_api path_beg /api
#     
#     # Use backend based on ACL
#     # use_backend api_servers if is_api
#     
#     default_backend web_servers

# Backend configuration for web servers
backend web_servers
    balance roundrobin
    option httpchk GET /health
    
    # Add your backend servers here
    # server web1 192.168.1.10:80 check
    # server web2 192.168.1.11:80 check
    # server web3 192.168.1.12:80 check
    
    # Example Docker container backends (using container names)
    # server app1 app1:3000 check
    # server app2 app2:3000 check

# Backend configuration for API servers (example)
# backend api_servers
#     balance leastconn
#     option httpchk GET /api/health
#     
#     # server api1 192.168.1.20:8080 check
#     # server api2 192.168.1.21:8080 check

# Backend configuration for static content servers (example)
# backend static_servers
#     balance roundrobin
#     
#     # server static1 192.168.1.30:80 check
#     # server static2 192.168.1.31:80 check
