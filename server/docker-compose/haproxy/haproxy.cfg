global
    log stdout local0
    log stdout local1 notice
    maxconn 4096
    stats socket /var/run/haproxy.sock mode 660 expose-fd listeners level admin
    stats timeout 30s
    master-worker
    expose-deprecated-directives
    insecure-fork-wanted

    # SSL/TLS Configuration
    tune.ssl.default-dh-param 2048
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option http-server-close
    option forwardfor except 127.0.0.0/8
    option redispatch
    retries 3
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    errorfile 400 /usr/local/etc/haproxy/errors/400.http
    errorfile 403 /usr/local/etc/haproxy/errors/403.http
    errorfile 408 /usr/local/etc/haproxy/errors/408.http
    errorfile 500 /usr/local/etc/haproxy/errors/500.http
    errorfile 502 /usr/local/etc/haproxy/errors/502.http
    errorfile 503 /usr/local/etc/haproxy/errors/503.http
    errorfile 504 /usr/local/etc/haproxy/errors/504.http

# User list for Data Plane API authentication
userlist dataplaneapi
    user admin insecure-password adminpwd  # Change this to a secure password in production

# Data Plane API program section
program api
    command /usr/local/bin/dataplaneapi -f /usr/local/etc/haproxy/dataplaneapi.yml
    no option start-on-reload

# Stats Frontend
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 30s
    stats realm HAProxy\ Statistics
    stats auth admin:admin  # Change this to a secure password in production

# HTTP Frontend - Redirect to HTTPS
frontend fe_http
    bind *:80
    mode http

    # Redirect all HTTP traffic to HTTPS
    http-request redirect scheme https code 301 unless { ssl_fc }

# HTTPS Frontend - TLS Termination
frontend fe_https
    # Load all certificates from directory (SNI-based routing)
    bind *:443 ssl crt /etc/ssl/certs/ alpn h2,http/1.1
    mode http

    # Security headers
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    http-response set-header X-Frame-Options "SAMEORIGIN"
    http-response set-header X-Content-Type-Options "nosniff"

    # Use SNI to route to correct backend (if domain-backend.map exists)
    # use_backend %[ssl_fc_sni,lower,map_dom(/usr/local/etc/haproxy/domain-backend.map,default_backend)]

    # Default backend for now
    default_backend default_backend

# Default Backend
backend default_backend
    mode http
    balance roundrobin
    # Add your backend servers here
    # Example: server app1 127.0.0.1:8080 check
