packages:
  - client
  - server
  - lib
  - acme

# Dependency cooldown (supply-chain defence): pnpm refuses to install any
# version published less than 5 days ago, including transitive deps. Most
# compromised releases are flagged and yanked within hours, so the delay
# filters smash-and-grab attacks at the install layer. 7200 minutes = 5 days.
# Added in pnpm 10.16; we run 10.32. Workspace-linked packages (workspace:)
# are never fetched from the registry, so the cooldown doesn't apply to them.
# To always-allow a trusted package despite the cooldown, add it under
# minimumReleaseAgeExclude (by name; supports globs, e.g. '@mini-infra/*').
minimumReleaseAge: 7200

# Transitive dependency version pins. These were previously in the root
# package.json `overrides` field under npm.
overrides:
  lodash: ^4.18.0
  defu: ^6.1.5
  path-to-regexp: ^8.4.0
  js-yaml: ^5.0.0
  '@azure/msal-node': ^5.1.5
  '@hono/node-server': ^1.19.14
  # TEMPORARY (dep-update branch): vite 8.1.0 (+ its rolldown 1.1.3 native
  # bindings) was <5 days old when the workspace was bumped to vitest 4.1.9,
  # so the cooldown above blocked it. Pin vite to the newest installable
  # release to keep the tree green. Remove this line once 8.1.x has cleared
  # the 5-day window and let vite float on its caret again.
  vite: ~8.0.16
  # Security pins for open Dependabot alerts on transitive pnpm-lock deps
  # (the npm-side lockfiles already carry these fixes). Each value is the
  # first patched version from the GitHub advisory; the caret lets future
  # patch releases float. undici and brace-expansion are major-scoped because
  # a second, non-vulnerable major (undici 8.x, brace-expansion 2.x) is also
  # installed and must be left untouched.
  protobufjs: ^7.6.3
  '@protobufjs/utf8': ^1.1.1
  hono: ^4.12.25
  ws: ^8.21.0
  fast-uri: ^3.1.2
  fast-xml-builder: ^1.1.7
  ip-address: ^10.1.1
  qs: ^6.15.2
  '@grpc/grpc-js': ^1.14.4
  '@babel/core': ^7.29.6
  'undici@7': ^7.28.0
  'brace-expansion@5': ^5.0.6

# pnpm 10 blocks postinstall scripts by default. Native modules and
# Prisma tooling need their install scripts to run, so allow them.
onlyBuiltDependencies:
  - better-sqlite3
  - argon2
  - esbuild
  - '@prisma/client'
  - '@prisma/engines'
  - prisma
