name: Cleanup Old Branches

on:
  schedule:
    # Run every night at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  cleanup-branches:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for all branches
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Delete old merged branches
        run: |
          echo "Fetching all remote branches..."
          git fetch --all --prune

          echo "Finding merged branches to delete..."
          # Get all remote branches except main and HEAD
          merged_branches=$(git branch -r --merged origin/main | grep -v "origin/main" | grep -v "HEAD" | sed 's/origin\///' | tr -d ' ')

          if [ -z "$merged_branches" ]; then
            echo "No merged branches found to delete"
          else
            echo "Found merged branches to delete:"
            echo "$merged_branches"

            # Delete each merged branch
            for branch in $merged_branches; do
              echo "Deleting branch: $branch"
              git push origin --delete "$branch" || echo "Failed to delete $branch (may already be deleted)"
            done
          fi

      - name: Delete stale branches (older than 30 days)
        run: |
          echo "Finding stale branches (older than 30 days)..."

          # Get all remote branches except main
          all_branches=$(git branch -r | grep -v "origin/main" | grep -v "HEAD" | sed 's/origin\///' | tr -d ' ')

          cutoff_date=$(date -d "30 days ago" +%s)

          for branch in $all_branches; do
            if [ -n "$branch" ]; then
              # Get the last commit date for this branch
              last_commit_date=$(git log -1 --format="%ct" "origin/$branch" 2>/dev/null || echo "0")

              if [ "$last_commit_date" -lt "$cutoff_date" ]; then
                echo "Deleting stale branch (older than 30 days): $branch"
                git push origin --delete "$branch" || echo "Failed to delete $branch (may already be deleted)"
              else
                echo "Keeping active branch: $branch"
              fi
            fi
          done

      - name: Summary
        run: |
          echo "Branch cleanup completed!"
          echo "Remaining remote branches:"
          git branch -r