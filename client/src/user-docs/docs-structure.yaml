# Documentation Structure
#
# Single source of truth for the docs menu, sidebar ordering,
# category metadata, and per-article topic annotations.
#
# Loaded at runtime by the frontend and available to the agent
# for documentation searches.
#
# - Category order matches array order below.
# - Article order within a category matches its array position.
# - Slugs correspond to the folder/file path under user-docs/
#   e.g. "overview" in "getting-started" → user-docs/getting-started/overview.md
# - Topics list the specific concepts, features, and intents each
#   article covers — used for search ranking and agent lookups.

sections:
  - slug: getting-started
    label: Getting Started
    description: Introduction and setup guides
    articles:
      - slug: overview
        topics:
          - What Mini Infra does and its core features
          - Dashboard overview — container and deployment summaries
          - Prerequisites — Docker, Azure, Cloudflare, GitHub connections
          - Recently died containers alert
          - Single Docker host management scope
      - slug: concepts
        topics:
          - Glossary of Mini Infra concepts and terminology
          - Containers — lifecycle, status, sensitive label redaction
          - Applications — configuration templates, deploy, update, stop lifecycle
          - Stacks — declarative plan/apply model, host-level vs environment-scoped
          - Stack definitions — versioned snapshots, drift detection, lastAppliedSnapshot
          - Stack templates — reusable blueprints, draft-and-publish versioning, scopes
          - Deployments — blue-green strategy, drain, rollback
          - Environments — named groupings, production vs nonproduction, network types
          - HAProxy — instances, frontends, backends, servers, Data Plane API
          - PostgreSQL backups — scheduling, encryption, Azure storage, restore
          - TLS certificates — ACME issuance, DNS-01 challenge, auto-renewal
          - Cloudflare tunnels — health monitoring, public hostname routing
          - Connected services — Docker, Azure, Cloudflare, GitHub connectivity
          - DNS zones — Cloudflare DNS management, proxied vs DNS-only
          - Volumes — inspection, file browsing
          - Docker networks — bridge driver, environment-scoped naming
          - API keys — permission scopes, presets, rotation
          - Events — audit log, progress tracking, Socket.IO streaming
          - Self-update — in-place upgrade with rollback
          - Agent sidecar — AI operations assistant
      - slug: navigating-the-dashboard
        topics:
          - Sidebar navigation sections and page layout
          - Dashboard cards — container counts, deployment counts, recent deployments
          - Contextual help buttons on pages
          - Status badge color meanings — green, yellow, blue, red, gray, orange
          - Breadcrumbs and back navigation
      - slug: running-with-docker
        topics:
          - Docker Compose setup for Mini Infra
          - Optional environment variables — APP_SECRET (auto-generated if not set)
          - Volume mounts — docker socket, data, logs
          - Health check endpoint /health
          - Graceful shutdown behavior
          - First-time setup steps after installation

