services:
  mini-infra:
    image: ghcr.io/mrgeoffrich/mini-infra:latest
    container_name: mini-infra
    restart: unless-stopped
    ports:
      - "${MINI_INFRA_PORT:-5000}:5000"
    volumes:
      # Mount Docker socket for container management
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent data storage
      - mini-infra-data:/app/data
      # Log files
      - mini-infra-logs:/app/server/logs
    environment:
      # Core Configuration
      - NODE_ENV=production

      # Security - REQUIRED (set in .env file)
      - SESSION_SECRET=${SESSION_SECRET}
      - API_KEY_SECRET=${API_KEY_SECRET}

      # Google OAuth (Optional - for authentication)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-http://localhost:5000/auth/google/callback}

      # Admin Access Control (comma-separated emails allowed to log in)
      - ALLOWED_ADMIN_EMAILS=${ALLOWED_ADMIN_EMAILS:-}

      # Server Configuration
      - PORT=5000
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:3000}
      - LOG_LEVEL=${LOG_LEVEL:-info}

      # Database
      - DATABASE_URL=file:/app/data/production.db?foreign_keys=true

      # Container Management
      - CONTAINER_CACHE_TTL=${CONTAINER_CACHE_TTL:-3000}
      - CONTAINER_POLL_INTERVAL=${CONTAINER_POLL_INTERVAL:-5000}

      # Azure Configuration (Optional)
      - AZURE_API_TIMEOUT=${AZURE_API_TIMEOUT:-15000}
      - CONNECTIVITY_CHECK_INTERVAL=${CONNECTIVITY_CHECK_INTERVAL:-300000}

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3

volumes:
  mini-infra-data:
    driver: local
  mini-infra-logs:
    driver: local
