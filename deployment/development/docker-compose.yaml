services:
  registry:
    image: registry:2
    container_name: mini-infra-dev-registry
    restart: unless-stopped
    ports:
      - "5051:5000"
    volumes:
      - mini-infra-dev-registry:/var/lib/registry

  mini-infra:
    build:
      context: ../../
      dockerfile: Dockerfile
      args:
        AGENT_SIDECAR_IMAGE_TAG: ${AGENT_SIDECAR_IMAGE_TAG:-localhost:5051/mini-infra-agent-sidecar:latest}
    container_name: mini-infra-dev
    user: root
    restart: unless-stopped
    depends_on:
      registry:
        condition: service_started
    ports:
      - "3005:5005"
    volumes:
      # Mount Docker socket for container management
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent data storage
      - mini-infra-dev-data:/app/data
      # Log files
      - mini-infra-dev-logs:/app/server/logs
    environment:
      - PUBLIC_URL=http://localhost:3005
      - LOG_LEVEL=debug
      - ALLOW_INSECURE=true

      # Tracing (Optional)
      # - TAP_COLLECTOR_URL=${TAP_COLLECTOR_URL:-}

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3

volumes:
  mini-infra-dev-data:
    driver: local
  mini-infra-dev-logs:
    driver: local
  mini-infra-dev-registry:
    driver: local
