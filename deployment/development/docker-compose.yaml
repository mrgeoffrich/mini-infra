services:
  registry:
    image: registry:2
    container_name: mini-infra-dev-registry
    restart: unless-stopped
    ports:
      - "5051:5000"
    volumes:
      - mini-infra-dev-registry:/var/lib/registry

  mini-infra:
    build:
      context: ../../
      dockerfile: Dockerfile
      args:
        AGENT_SIDECAR_IMAGE_TAG: ${AGENT_SIDECAR_IMAGE_TAG:-localhost:5051/mini-infra-agent-sidecar:latest}
    container_name: mini-infra-dev
    user: root
    restart: unless-stopped
    depends_on:
      registry:
        condition: service_started
    ports:
      - "${MINI_INFRA_PORT:-3005}:5000"
    volumes:
      # Mount Docker socket for container management
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent data storage
      - mini-infra-dev-data:/app/data
      # Log files
      - mini-infra-dev-logs:/app/server/logs
    environment:
      - NODE_ENV=production
      - PORT=5000
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:3005}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - DATABASE_URL=file:/app/data/production.db?foreign_keys=true&journal_mode=WAL

      # Security (set in .env file)
      - SESSION_SECRET=${SESSION_SECRET}
      - API_KEY_SECRET=${API_KEY_SECRET}
      - ENCRYPTION_SECRET=${ENCRYPTION_SECRET:-}

      # Google OAuth (Optional)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-http://localhost:3005/auth/google/callback}
      - ALLOWED_ADMIN_EMAILS=${ALLOWED_ADMIN_EMAILS:-}

      # Container Management
      - CONTAINER_CACHE_TTL=${CONTAINER_CACHE_TTL:-3000}
      - CONTAINER_POLL_INTERVAL=${CONTAINER_POLL_INTERVAL:-5000}

      # Azure Configuration (Optional)
      - AZURE_API_TIMEOUT=${AZURE_API_TIMEOUT:-15000}
      - CONNECTIVITY_CHECK_INTERVAL=${CONNECTIVITY_CHECK_INTERVAL:-300000}

      # AI Agent (Optional)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AGENT_LOG_LEVEL=${AGENT_LOG_LEVEL:-debug}

      # Tracing (Optional)
      - TAP_COLLECTOR_URL=${TAP_COLLECTOR_URL:-}

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3

volumes:
  mini-infra-dev-data:
    driver: local
  mini-infra-dev-logs:
    driver: local
  mini-infra-dev-registry:
    driver: local
