<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 880" width="600" font-family="system-ui, sans-serif" font-size="12">
  <rect x="0" y="0" width="600" height="880" fill="#fafafa" stroke="#ddd"/>

  <!-- Page header -->
  <rect x="20" y="20" width="40" height="40" fill="#e0e7ff" stroke="#a5b4fc" rx="6"/>
  <text x="40" y="44" text-anchor="middle" font-size="13">⌘</text>
  <text x="72" y="36" font-size="16" font-weight="600">Tailscale</text>
  <text x="72" y="54" fill="#6b7280">First-run: Stepper. After save: Summary view (right).</text>

  <!-- ============================ -->
  <!-- LEFT: First-run stepper card -->
  <!-- ============================ -->
  <rect x="20" y="80" width="285" height="780" fill="#fff" stroke="#e5e7eb" rx="6"/>
  <text x="36" y="104" font-weight="600" font-size="12" fill="#374151">FIRST-RUN — STEPPER</text>

  <!-- Stepper rail -->
  <circle cx="44" cy="138" r="11" fill="#10b981"/>
  <text x="44" y="142" text-anchor="middle" fill="#fff" font-size="11">✓</text>
  <line x1="44" y1="151" x2="44" y2="338" stroke="#10b981" stroke-width="2"/>
  <circle cx="44" cy="350" r="11" fill="#3b82f6"/>
  <text x="44" y="354" text-anchor="middle" fill="#fff" font-size="11">2</text>
  <line x1="44" y1="363" x2="44" y2="612" stroke="#d1d5db" stroke-width="2" stroke-dasharray="3 3"/>
  <circle cx="44" cy="624" r="11" fill="#fff" stroke="#d1d5db" stroke-width="2"/>
  <text x="44" y="628" text-anchor="middle" fill="#9ca3af" font-size="11">3</text>

  <!-- Step 1 (collapsed, completed) -->
  <text x="64" y="134" font-weight="600">1. Tags</text>
  <text x="64" y="150" fill="#6b7280">tag:mini-infra-managed, tag:homelab</text>
  <text x="260" y="142" fill="#3b82f6" font-size="11" text-anchor="end">edit ▾</text>

  <!-- Step 2 (active, expanded) -->
  <text x="64" y="346" font-weight="600">2. Apply ACL in Tailscale</text>
  <text x="64" y="362" fill="#6b7280">Paste this into your tailnet policy</text>
  <text x="64" y="378" fill="#2563eb" text-decoration="underline" font-size="11">login.tailscale.com/admin/acls</text>

  <!-- Code block -->
  <rect x="64" y="388" width="225" height="146" fill="#0f172a" rx="4"/>
  <text x="72" y="404" fill="#e2e8f0" font-family="monospace" font-size="9">{</text>
  <text x="80" y="416" fill="#e2e8f0" font-family="monospace" font-size="9">"tagOwners": {</text>
  <text x="88" y="428" fill="#e2e8f0" font-family="monospace" font-size="9">"tag:mini-infra-managed":</text>
  <text x="96" y="440" fill="#e2e8f0" font-family="monospace" font-size="9">["autogroup:admin"] },</text>
  <text x="80" y="454" fill="#e2e8f0" font-family="monospace" font-size="9">"grants": [{ "src":["*"],</text>
  <text x="88" y="466" fill="#e2e8f0" font-family="monospace" font-size="9">"dst":["tag:mini-…"], … }],</text>
  <text x="80" y="480" fill="#e2e8f0" font-family="monospace" font-size="9">"ssh": [{ "action": "check",</text>
  <text x="88" y="492" fill="#e2e8f0" font-family="monospace" font-size="9">"checkPeriod": "12h", … }]</text>
  <text x="72" y="506" fill="#e2e8f0" font-family="monospace" font-size="9">}</text>
  <rect x="232" y="396" width="50" height="20" fill="#1e293b" stroke="#475569" rx="3"/>
  <text x="257" y="410" text-anchor="middle" fill="#e2e8f0" font-size="10">📋 Copy</text>

  <!-- "I've pasted" checkbox -->
  <rect x="64" y="548" width="14" height="14" fill="#fff" stroke="#9ca3af" rx="2"/>
  <text x="84" y="560" fill="#374151">I've pasted this into my tailnet policy</text>

  <!-- Continue button -->
  <rect x="64" y="572" width="116" height="28" fill="#1f2937" rx="4"/>
  <text x="122" y="590" text-anchor="middle" fill="#fff" font-size="11">Continue →</text>

  <!-- Step 3 (pending, greyed) -->
  <text x="64" y="620" font-weight="600" fill="#9ca3af">3. OAuth credentials</text>
  <text x="64" y="636" fill="#9ca3af">Paste client ID and secret</text>


  <!-- ============================ -->
  <!-- RIGHT: After save — summary  -->
  <!-- ============================ -->
  <rect x="320" y="80" width="260" height="430" fill="#fff" stroke="#e5e7eb" rx="6"/>
  <text x="336" y="104" font-weight="600" font-size="12" fill="#374151">CONFIGURED — SUMMARY</text>

  <!-- Status banner -->
  <rect x="336" y="116" width="228" height="32" fill="#ecfdf5" stroke="#10b981" rx="4"/>
  <text x="346" y="136" fill="#047857">● Connected · last validated 5m ago</text>

  <!-- Row: Tags -->
  <line x1="336" y1="160" x2="564" y2="160" stroke="#e5e7eb"/>
  <text x="336" y="180" font-size="11" fill="#6b7280">TAGS</text>
  <rect x="336" y="188" width="120" height="20" fill="#f3f4f6" stroke="#9ca3af" rx="10"/>
  <text x="346" y="202" font-size="10">tag:mini-infra-managed</text>
  <rect x="462" y="188" width="58" height="20" fill="#eff6ff" stroke="#93c5fd" rx="10"/>
  <text x="468" y="202" font-size="10">tag:homelab</text>
  <text x="556" y="200" font-size="11" text-anchor="end" fill="#3b82f6">edit</text>

  <!-- Row: ACL -->
  <line x1="336" y1="226" x2="564" y2="226" stroke="#e5e7eb"/>
  <text x="336" y="246" font-size="11" fill="#6b7280">ACL SNIPPET</text>
  <text x="336" y="266" fill="#374151">Applied · regenerates from tags</text>
  <rect x="490" y="252" width="74" height="22" fill="#fff" stroke="#d1d5db" rx="4"/>
  <text x="527" y="267" text-anchor="middle" font-size="11">📋 Copy</text>

  <!-- Row: OAuth -->
  <line x1="336" y1="290" x2="564" y2="290" stroke="#e5e7eb"/>
  <text x="336" y="310" font-size="11" fill="#6b7280">OAUTH CREDENTIALS</text>
  <text x="336" y="330" fill="#374151">k…CNTRL · secret hidden</text>
  <rect x="490" y="316" width="74" height="22" fill="#fff" stroke="#d1d5db" rx="4"/>
  <text x="527" y="331" text-anchor="middle" font-size="11">↻ Rotate</text>

  <!-- Disconnect -->
  <line x1="336" y1="356" x2="564" y2="356" stroke="#e5e7eb"/>
  <text x="336" y="376" fill="#dc2626">Disconnect Tailscale</text>
  <text x="336" y="394" fill="#9ca3af" font-size="11">Wipes credentials. Devices stay registered.</text>

  <!-- Caption -->
  <text x="450" y="490" text-anchor="middle" fill="#6b7280" font-size="11">After Save, the stepper</text>
  <text x="450" y="506" text-anchor="middle" fill="#6b7280" font-size="11">collapses to this summary.</text>
</svg>
