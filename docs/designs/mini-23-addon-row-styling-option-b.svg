<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 460" width="600" font-family="system-ui, sans-serif" font-size="12">
  <rect x="0" y="0" width="600" height="460" fill="#fafafa" stroke="#ddd"/>

  <!-- Stack detail header -->
  <text x="16" y="22" font-size="13" font-weight="600">Stack detail · Services</text>
  <text x="16" y="38" fill="#666">Flat rows; violet "from addon · target" pill in the name cell; no chevron / Edit on synthetic.</text>

  <!-- Table header -->
  <rect x="16" y="48" width="568" height="22" fill="#f1f1f1" stroke="#ddd"/>
  <text x="28" y="63" fill="#666">Name</text>
  <text x="320" y="63" fill="#666">Type</text>
  <text x="410" y="63" fill="#666">Image</text>
  <text x="520" y="63" fill="#666">Status</text>

  <!-- web-app row (parent, has chevron) -->
  <rect x="16" y="70" width="568" height="32" fill="#fff" stroke="#e5e5e5"/>
  <text x="28" y="91" font-weight="600">▸</text>
  <text x="50" y="91" font-weight="600">web-app</text>
  <rect x="320" y="76" width="74" height="18" rx="4" fill="#fff" stroke="#aaa"/>
  <text x="328" y="89">🌐 StatelessWeb</text>
  <text x="410" y="91" font-family="monospace" font-size="11">nginx:1.27</text>
  <text x="520" y="91" fill="#0a8a3a">2/2 up</text>

  <!-- web-app-tailscale (synthetic; no chevron, pill, no Edit) -->
  <rect x="16" y="102" width="568" height="32" fill="#fcfaff" stroke="#e5e5e5"/>
  <text x="50" y="123" font-weight="500">web-app-tailscale</text>
  <rect x="178" y="110" width="125" height="18" rx="4" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="184" y="123" fill="#5b21b6">🧩 from tailscale-ssh</text>
  <rect x="320" y="108" width="60" height="18" rx="4" fill="#fff" stroke="#aaa"/>
  <text x="328" y="121">🔌 Sidecar</text>
  <text x="410" y="123" font-family="monospace" font-size="11">tailscale:stable</text>
  <text x="520" y="123" fill="#0a8a3a">1/1 up</text>

  <!-- db row -->
  <rect x="16" y="134" width="568" height="32" fill="#fff" stroke="#e5e5e5"/>
  <text x="28" y="155" font-weight="600">▸</text>
  <text x="50" y="155" font-weight="600">db</text>
  <rect x="320" y="140" width="64" height="18" rx="4" fill="#fff" stroke="#aaa"/>
  <text x="328" y="153">🗄 Stateful</text>
  <text x="410" y="155" font-family="monospace" font-size="11">postgres:16</text>
  <text x="520" y="155" fill="#0a8a3a">1/1 up</text>

  <!-- db-tailscale synthetic -->
  <rect x="16" y="166" width="568" height="32" fill="#fcfaff" stroke="#e5e5e5"/>
  <text x="50" y="187" font-weight="500">db-tailscale</text>
  <rect x="138" y="174" width="125" height="18" rx="4" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="144" y="187" fill="#5b21b6">🧩 from tailscale-ssh</text>
  <rect x="320" y="172" width="60" height="18" rx="4" fill="#fff" stroke="#aaa"/>
  <text x="328" y="185">🔌 Sidecar</text>
  <text x="410" y="187" font-family="monospace" font-size="11">tailscale:stable</text>
  <text x="520" y="187" fill="#0a8a3a">1/1 up</text>

  <!-- Containers page header -->
  <text x="16" y="244" font-size="13" font-weight="600">Containers page</text>
  <text x="16" y="260" fill="#666">Same pill, same colour. Back-reference (· web-app) is a click → target container.</text>

  <!-- Container table header -->
  <rect x="16" y="270" width="568" height="22" fill="#f1f1f1" stroke="#ddd"/>
  <text x="28" y="285" fill="#666">Container Name</text>
  <text x="380" y="285" fill="#666">Status</text>
  <text x="470" y="285" fill="#666">Image</text>

  <!-- Container rows -->
  <rect x="16" y="292" width="568" height="34" fill="#fff" stroke="#e5e5e5"/>
  <text x="28" y="313" font-weight="500">web-app</text>
  <rect x="380" y="300" width="62" height="18" rx="4" fill="#dcfce7"/>
  <text x="388" y="313" fill="#0a8a3a">running</text>
  <text x="470" y="313" font-family="monospace" font-size="11">nginx:1.27</text>

  <rect x="16" y="326" width="568" height="34" fill="#fff" stroke="#e5e5e5"/>
  <text x="28" y="347" font-weight="500">web-app-tailscale</text>
  <rect x="160" y="334" width="170" height="18" rx="4" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="168" y="347" fill="#5b21b6">🧩 from tailscale-ssh · web-app</text>
  <rect x="380" y="334" width="62" height="18" rx="4" fill="#dcfce7"/>
  <text x="388" y="347" fill="#0a8a3a">running</text>

  <rect x="16" y="360" width="568" height="34" fill="#fff" stroke="#e5e5e5"/>
  <text x="28" y="381" font-weight="500">db</text>
  <rect x="380" y="368" width="62" height="18" rx="4" fill="#dcfce7"/>
  <text x="388" y="381" fill="#0a8a3a">running</text>
  <text x="470" y="381" font-family="monospace" font-size="11">postgres:16</text>

  <rect x="16" y="394" width="568" height="34" fill="#fff" stroke="#e5e5e5"/>
  <text x="28" y="415" font-weight="500">db-tailscale</text>
  <rect x="120" y="402" width="170" height="18" rx="4" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="128" y="415" fill="#5b21b6">🧩 from tailscale-ssh · db</text>
  <rect x="380" y="402" width="62" height="18" rx="4" fill="#dcfce7"/>
  <text x="388" y="415" fill="#0a8a3a">running</text>
</svg>
