<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" font-family="system-ui, sans-serif" font-size="13">
  <rect x="0" y="0" width="800" height="540" fill="#fafafa" stroke="#ddd"/>

  <!-- LEFT: Connect card with summary rows -->
