<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 760" width="600" font-family="system-ui, sans-serif" font-size="12">
  <rect x="0" y="0" width="600" height="760" fill="#fafafa" stroke="#ddd"/>

  <!-- Page header -->
  <rect x="20" y="20" width="40" height="40" fill="#e0e7ff" stroke="#a5b4fc" rx="6"/>
  <text x="40" y="44" text-anchor="middle" font-size="13">⌘</text>
  <text x="72" y="36" font-size="16" font-weight="600">Tailscale</text>
  <text x="72" y="54" fill="#6b7280">Configure tailnet OAuth credentials and ACL bootstrap</text>

  <!-- Card -->
  <rect x="20" y="80" width="560" height="660" fill="#fff" stroke="#e5e7eb" rx="6"/>

  <!-- Card header -->
  <text x="36" y="106" font-weight="600" font-size="13">OAuth integration</text>
  <text x="36" y="124" fill="#6b7280">Connect Mini Infra to a Tailscale tailnet so it can mint authkeys for addon sidecars.</text>

  <!-- How-to paragraph -->
  <rect x="36" y="138" width="528" height="44" fill="#f9fafb" stroke="#e5e7eb" rx="4"/>
  <text x="48" y="156" fill="#374151">Setup order: 1) edit tags below → 2) paste the ACL snippet into your tailnet policy at</text>
  <text x="48" y="172" fill="#2563eb" text-decoration="underline">login.tailscale.com/admin/acls</text>
  <text x="220" y="172" fill="#374151"> → 3) create an OAuth client &amp; assign tag:mini-infra-managed → 4) paste credentials.</text>

  <!-- Section 1: Tags -->
  <line x1="36" y1="200" x2="564" y2="200" stroke="#e5e7eb"/>
  <text x="36" y="222" font-weight="600">🏷  Tags</text>
  <text x="36" y="240" fill="#6b7280">Tags scoped on devices Mini Infra registers in your tailnet.</text>

  <rect x="36" y="252" width="528" height="40" fill="#fff" stroke="#d1d5db" rx="4"/>
  <!-- Pinned chip -->
  <rect x="44" y="262" width="156" height="22" fill="#f3f4f6" stroke="#9ca3af" rx="11"/>
  <text x="54" y="277" font-size="11">tag:mini-infra-managed</text>
  <text x="190" y="277" font-size="10" fill="#9ca3af">🔒</text>
  <!-- Optional extra chip -->
  <rect x="208" y="262" width="84" height="22" fill="#eff6ff" stroke="#93c5fd" rx="11"/>
  <text x="216" y="277" font-size="11">tag:homelab</text>
  <text x="284" y="277" font-size="11" fill="#3b82f6">×</text>
  <!-- Input -->
  <text x="304" y="277" fill="#9ca3af">Add tag and press Enter…</text>

  <text x="36" y="306" fill="#b45309" font-style="italic">⚠ Adding tags affects future tailnet devices only.</text>

  <!-- Section 2: ACL snippet -->
  <line x1="36" y1="324" x2="564" y2="324" stroke="#e5e7eb"/>
  <text x="36" y="346" font-weight="600">🛡  Bootstrap ACL snippet</text>
  <text x="36" y="364" fill="#6b7280">Paste this into your tailnet policy file. Updates live as you edit tags above.</text>

  <rect x="36" y="376" width="528" height="138" fill="#0f172a" rx="4"/>
  <text x="44" y="394" fill="#e2e8f0" font-family="monospace" font-size="11">{</text>
  <text x="52" y="408" fill="#e2e8f0" font-family="monospace" font-size="11">"tagOwners": { "tag:mini-infra-managed": ["autogroup:admin"] },</text>
  <text x="52" y="422" fill="#e2e8f0" font-family="monospace" font-size="11">"grants": [{ "src": ["*"], "dst": ["tag:mini-infra-managed"], … }],</text>
  <text x="52" y="436" fill="#e2e8f0" font-family="monospace" font-size="11">"ssh": [{ "action": "check", "checkPeriod": "12h",</text>
  <text x="76" y="450" fill="#e2e8f0" font-family="monospace" font-size="11">"src": ["autogroup:member"], "dst": ["tag:mini-infra-managed"],</text>
  <text x="76" y="464" fill="#e2e8f0" font-family="monospace" font-size="11">"users": ["root"] }]</text>
  <text x="44" y="478" fill="#e2e8f0" font-family="monospace" font-size="11">}</text>
  <!-- Copy button -->
  <rect x="500" y="384" width="56" height="22" fill="#1e293b" stroke="#475569" rx="4"/>
  <text x="528" y="399" text-anchor="middle" fill="#e2e8f0" font-size="11">📋 Copy</text>

  <!-- Section 3: OAuth credentials -->
  <line x1="36" y1="538" x2="564" y2="538" stroke="#e5e7eb"/>
  <text x="36" y="560" font-weight="600">🔑  OAuth credentials</text>
  <text x="36" y="578" fill="#6b7280">Create an OAuth client, assign tag:mini-infra-managed, then paste below.</text>

  <text x="36" y="600" font-size="11" fill="#374151">Client ID</text>
  <rect x="36" y="606" width="528" height="32" fill="#fff" stroke="#d1d5db" rx="4"/>
  <text x="44" y="626" fill="#9ca3af" font-family="monospace">k…CNTRL</text>

  <text x="36" y="654" font-size="11" fill="#374151">Client Secret</text>
  <rect x="36" y="660" width="528" height="32" fill="#fff" stroke="#d1d5db" rx="4"/>
  <text x="44" y="680" fill="#9ca3af" font-family="monospace">tskey-client-…</text>
  <text x="540" y="680" fill="#6b7280">👁</text>

  <!-- Validate & Save button -->
  <rect x="36" y="708" width="148" height="32" fill="#1f2937" rx="4"/>
  <text x="110" y="728" text-anchor="middle" fill="#fff" font-size="12">✓  Validate &amp; Save</text>
</svg>
